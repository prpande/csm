# electron-builder configuration for CSM. Kept as a standalone file (not a
# package.json "build" key) so the packaging config stays readable and reviewable
# on its own. Mirrors PRism's preview-packaging setup: no sidecar binaries, no
# extraResources, unsigned (identity: null) builds for preview distribution.
#
# `npm run dist` builds the app (tsc + vite) then runs electron-builder against
# this file, emitting artifacts to release/ for whichever OS it runs on.

# Must equal the AppUserModelID set in src/main.ts (app.setAppUserModelId) so
# Windows groups the taskbar button and reads the icon from the same identity.
appId: com.prpande.csm
productName: CSM

directories:
  # release/ is gitignored. Icons are referenced explicitly from win.icon /
  # mac.icon below (pointing at the committed assets/icons/ source set) rather than
  # duplicated into the default build/ resources dir — one source of truth (#36).
  output: release

# Only the build output ships. The renderer bundles react/react-dom via Vite, and
# main/preload import nothing beyond Electron + Node builtins, so no production
# node_modules are needed at runtime — this keeps the package lean.
files:
  - dist/**
  - package.json

win:
  # Multi-resolution .ico from the committed source set; embedded in the portable
  # .exe and the nsis installer, and shown on the taskbar.
  icon: assets/icons/icon.ico
  # portable = single self-contained .exe (no install); nsis = a normal installer.
  target:
    - portable
    - nsis

mac:
  category: public.app-category.developer-tools
  # .icns bundle from the committed source set; shown in the dock and Finder.
  icon: assets/icons/icon.icns
  # Unsigned preview build — no Developer ID. Setting identity to null skips the
  # signing step entirely (Gatekeeper will warn on first open, expected for a
  # preview). Real signing/notarization is a later, separate concern.
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
