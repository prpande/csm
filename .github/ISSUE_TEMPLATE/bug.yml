name: Bug report
description: Something doesn't work as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug. Please fill in enough detail to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + version, CSM version/commit, and `claude --version`.
      placeholder: "Windows 11 / CSM @abc1234 / claude 2.1.x"
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkable conditions that mean this bug is fixed.
      placeholder: |
        - [ ] ...
    validations:
      required: false
