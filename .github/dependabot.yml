version: 2
updates:
  # Keeps the SHA-pinned actions current (covers .github/workflows and the
  # composite action under .github/actions).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
