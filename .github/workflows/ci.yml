name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: lint · typecheck · build · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      # lint/typecheck/build/Vitest need neither the Electron binary (types come
      # from the npm package) nor Playwright browsers (Vitest uses jsdom), so skip
      # both downloads. The e2e job keeps the Electron binary but still skips the
      # Playwright browsers (it drives _electron, not a browser).
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      # Last, per the issue. Scoped to the production tree (--omit=dev): that is
      # the surface shipped to users, and it blocks on high+ there. The Electron
      # framework and build tooling (electron-builder, node-gyp, tar) carry a
      # steady stream of advisories that would otherwise redden every PR; those
      # devDependencies are kept current by dependabot instead.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: e2e (electron · linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Pinned Playwright image; tag tracks the locked @playwright/test version so
    # the bundled system deps match. Bump together when Playwright is upgraded.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    env:
      # The suite drives _electron only (no browser), and the image already
      # bundles browsers — skip the redundant postinstall download. The Electron
      # binary is NOT skipped here: _electron.launch needs it.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
      - name: Install dependencies
        run: npm ci
      # The Playwright image runs as root, so npm de-escalates lifecycle scripts:
      # Electron's postinstall writes path.txt but never places the binary in
      # dist/, and _electron.launch then fails with "Electron failed to install
      # correctly". install.js short-circuits on the stale path.txt, so remove it
      # first and run the installer directly (as root); assert the binary landed.
      - name: Fetch the Electron binary
        run: |
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          node node_modules/electron/install.js
          test -x node_modules/electron/dist/electron
      # pretest:e2e builds dist/ first; xvfb supplies the headless display. The
      # container runs as root, so the spec adds --no-sandbox under CI.
      - name: Run e2e
        run: xvfb-run -a npm run test:e2e
