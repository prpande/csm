name: Setup toolchain
description: >-
  Install the Node version pinned in .nvmrc and restore the npm cache. Shared by
  every CI job so the toolchain version lives in exactly one place (.nvmrc).

runs:
  using: composite
  steps:
    - name: Set up Node
      # SHA-pinned per the repo's supply-chain policy; dependabot (github-actions)
      # bumps the SHA + comment together.
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
